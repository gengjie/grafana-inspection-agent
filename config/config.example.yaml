# Grafana Inspection Agent Configuration

# Grafana Configuration
grafana:
  url: "https://grafana.example.com"  # Grafana instance URL
  api_key: "your-grafana-api-key"     # Grafana API key (Service Account token)
  timeout: 30                          # Request timeout in seconds

# LLM Configuration
llm:
  provider: "github_copilot"          # Only github_copilot is supported
  access_token: "ghp_xxx"             # GitHub access token (used to exchange session token)
  model: "claude-sonnet-4.6"                      # Copilot model name (default)
  api_base: "https://api.githubcopilot.com"   # Copilot API base URL
  token_url: "https://api.github.com/copilot_internal/v2/token"  # Session token exchange endpoint
  editor_version: "vscode/1.99.0"     # Header required by Copilot protocol
  editor_plugin_version: "copilot-chat/0.26.7" # Header required by Copilot protocol
  user_agent: "GitHubCopilotChat/0.26.7"       # User-Agent header
  temperature: 0.1                     # Temperature for generation (0.0-1.0)
  max_tokens: 1000000                  # Maximum tokens for generation
  jvm_max_panels: 100                  # Maximum JVM panels included for analysis
  jvm_keywords:                        # Configurable JVM panel matching keywords
    - "jvm"
    - "heap"
    - "non-heap"
    - "gc"
    - "metaspace"
    - "thread"
    - "Memory Usage"
    - "Throughput"

# Notification Configuration
notification:
  # Email Configuration
  # Sensitive SMTP fields (smtp_user, smtp_password) should be set via env vars:
  #   SMTP_HOST, SMTP_PORT, SMTP_USER, SMTP_PASSWORD, EMAIL_FROM, EMAIL_TO
  email:
    enabled: true                     # Enable email notifications
    to_addresses:                      # Recipient email addresses
      - "jie.geng@dsv.com"
    use_tls: true                      # Use TLS for SMTP (implicit TLS / SMTPS on port 465)

  # Teams Configuration
  teams:
    enabled: true                     # Enable Teams notifications
    webhook_url: "https://dbschenker.webhook.office.com/webhookb2/49b6aaa1-ca8b-45eb-8851-6ca733b1f7fb@c5d1e823-e2b8-46bf-92ff-84f54313e0a5/IncomingWebhook/6de06a8207cb40fbb3bcc36848d7ec76/7f8f9b69-6511-4815-931f-e1b92242a150/V2gCbXu5Dzd0b7SYksmkiDT6CnWEW8ePDoO9dNvn7ps281"  # Teams webhook URL

# Logging Configuration
logging:
  level: "INFO"                        # Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_file: null                       # Path to log file (null = output to terminal only, default)
  # log_file: "logs/grafana-agent.log" # Optional: write logs to file (will also output to terminal)
  log_format: null                     # Custom log format (null for default)
  date_format: null                    # Custom date format (null for default)

# Memory Configuration (mem0)
memory:
  enabled: true                        # Enable mem0 memory storage
  storage_path: "config/mem0"           # Local storage path for mem0 data
  namespace: "grafana-agent"            # mem0 user_id/namespace
  history_mode: "days"                  # History retrieval mode: "days" or "count"
  history_days: 30                      # Days of history to include
  history_count: 20                     # Number of reports to include
  max_history_chars: 800000             # Max characters passed into long-term summary

# General Configuration
timezone: "UTC"                        # Timezone for time calculations
lookback_hours: 24                     # Hours to look back for inspection
language: "zh"                         # Report language: "zh" for Chinese (default), "en" for English

